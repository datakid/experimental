    "drug_name_ar": "بروتوكول فينيتوكلاكس لابيضاض الدم النقوي الحاد (Venetoclax)",
    "drug_name_en": "Venetoclax in Acute Myeloid Leukemia (AML) Protocol",
    "protocol_ar": "الضوابط الطبية وجدول الجرعات المعتمد لصرف عقار فينيتوكلاكس (Venetoclax) لمرضى ابيضاض الدم النقوي الحاد (Acute Myeloid Leukemia - AML) غير الملائمين صحياً لتلقي العلاج الكيماوي المكثف:\n\nالبروتوكول العلاجي المشترك المعتمد:\n- يعطى العقار كعلاج مشترك ضمن بروتوكول (Venetoclax + LDAC + voriconazole).\n- الجرعة المعتمدة للمريض: 100 مجم من عقار فينيتوكلاكس يومياً عن طريق الفم لمدة 28 يوماً متتالية لكل دورة علاجية شهرية.\n- الحد الأقصى للعلاج: 6 دورات علاجية متتالية شهرياً، وتجب بعد ذلك إعادة تقييم استجابة المريض الإكلينيكية وفحص نخاع العظم لتحديد جدوى الاستمرار.\n- الصرف يتم بموجب قرار اللجنة الطبية العليا لأمراض الدم وموافقة رئيس الهيئة.",
    "keywords": ["Venetoclax", "AML", "acute myeloid leukemia", "LDAC", "voriconazole", "فينيتوكلاكس", "سرطان الدم النقوي الحاد", "امراض الدم"]
  },
  {
    "drug_name_ar": "أقراص إيزوسوربيد أحادي النترات (Isosorbide-5-mononitrate 25mg)",
    "drug_name_en": "Isosorbide-5-mononitrate 25mg Capsules Guidelines",
    "protocol_ar": "في إطار العمل على تأمين سلاسل الإمداد الدوائي لمرضى القلب والشرايين وتوفير تركيزات علاجية مرنة ومتنوعة، تقرر الآتي:\n- إتاحة طلب وصرف صنف Isosorbide-5-mononitrate بتركيز 25 مجم كبسولات على المنظومة كإضافة للتركيزات المتوفرة مسبقاً بقائمة الأدوية الأساسية للهيئة.\n- سلطة الوصف المعتمدة للعقار: طبيب أخصائي أمراض الباطنة أو أخصائي أمراض القلب والأوعية الدموية بالعيادات والمستشفيات التابعة للهيئة.",
    "keywords": ["Isosorbide", "mononitrate", "ايزوسوربيد", "مونو نيترات", "امراض القلب", "قصور الشرايين التاجية", "الباطنة"]
  },
  {
    "drug_name_ar": "بروتوكول بيميتريكسيد لعلاج أورام الرئة (Pemetrexed)",
    "drug_name_en": "Pemetrexed for Non-Small Cell Lung Cancer (NSCLC) Protocol",
    "protocol_ar": "تحديث بروتوكول علاج أورام الرئة باستخدام عقار بيميتريكسيد (Pemetrexed) بناءً على التوصيات الطبية لشبكة السرطان الوطنية الأمريكية الشاملة (NCCN guidelines):\n\nشروط وضوابط وصف العلاج:\n1. تشترط إصابة المريض بسرطان الرئة غير صغير الخلايا (Non-Small Cell Lung Cancer - NSCLC) مثبت ومؤكد نسيجياً بتقرير فحص نسيجي مرضي (Pathologically confirmed).\n2. إجراء تقييم إشعاعي ومختبري كامل وشامل للمريض لتحديد مدى انتشار المرض وحالة الأعضاء الحيوية بدقة قبل البدء في أول جرعة.\n3. إجراءات وقائية إلزامية مصاحبة للعلاج (Premedication):\n- يجب إعطاء المريض حمض الفوليك (Folic acid) عن طريق الفم بالتزامن مع حقن فيتامين ب12 طويل المفعول (Depovit-B12) قبل بدء كورس العلاج بجرعات كافية لحماية خلايا الجسم والدم من الآثار الجانبية الشديدة للعقار.\n4. جدول تقييم الاستجابة العلاجية:\n- يخضع المريض لتقييم دقيق وشامل لقياس استجابة الأورام بعد تلقيه 3 دورات علاجية متتالية بالبيميتريكسيد:\n  * في حال ثبوت الاستجابة الإيجابية وتراجع حجم الأورام: يستمر المريض في تلقي العلاج لـ 3 دورات علاجية إضافية (بحد أقصى 6 دورات إجمالية) مع المتابعة الدقيقة حتى الوصول لأقصى استجابة علاجية ممكنة.\n  * في حال عدم استجابة الأورام أو تدهور الحالة بعد أول 3 دورات: يجب إيقاف العقار فوراً وتوجيه المريض لخط علاجي بديل يتناسب مع حالته.\n\nتنبيه: تلتزم لجان الأورام بالفروع بتطبيق هذه الضوابط بدقة دون أي استثناء وتجنب المخالفة.",
    "keywords": ["Pemetrexed", "NSCLC", "NCCN", "lung cancer", "بيميتريكسيد", "اورام الرئة", "سرطان الرئة", "الكيماوي"]
  },
  {
    "drug_name_ar": "أقراص تادالافيل لتضخم البروستاتا الحميد (Tadalafil 5mg)",
    "drug_name_en": "Tadalafil 5mg for Benign Prostatic Hyperplasia (BPH)",
    "protocol_ar": "ضوابط طلب وصرف أقراص Tadalafil 5mg لمرضى تضخم البروستاتا الحميد:\n- يسمح للمستشفيات والعيادات بطلب وصرف عقار Tadalafil 5mg لعلاج حالات تضخم البروستاتا الحميد (BPH) المصحوبة بأعراض المسالك البولية السفلية.\n- سلطة الوصف المعتمدة: طبيب استشاري جراحة المسالك البولية بالهيئة.\n- الجرعة اليومية القصوى المسموحة للمريض: قرص واحد يومياً (تركيز 5 مجم).\n- شروط الطلب والتمويل: نظراً لتحديد سعر القرص على المنظومة بمبلغ 3.51 جنيه مصري فقط، يلتزم التموين الطبي بطلب العقار مناصفة (بنسبة 50% إلى 50%) مع البدائل العلاجية الأخرى المعتمدة مسبقاً لعلاج BPH لتأمين التوازن المالي ومواجهة العجز.",
    "keywords": ["Tadalafil", "BPH", "تادالافيل", "تضخم البروستاتا", "مسالك بولية", "استشاري مسالك"]
  },
  {
    "drug_name_ar": "تحاليل وفحوصات جينية مجانية لمرضى الأورام والدم",
    "drug_name_en": "Free Genetic Testing Protocols for Oncology Patients",
    "protocol_ar": "توضيح وتوجيه هام بخصوص طلب وإجراء الفحوصات والتحاليل الجينية التخصصية لمرضى الأورام وأمراض الدم:\n\n- تشمل هذه الفحوصات الجينية التحاليل التالية المعتمدة ببروتوكولات الأورام والدم بالهيئة لتقرير وتحديد خطة العلاج البيولوجي أو الموجه:\n  1. فحص حذف الذراع القصير للكروموسوم 17 (17P Deletion Test).\n  2. فحص الطفرات الجينية لسرطان الثدي والمبيض (BRCA test).\n  3. فحص طفرات مستقبلات عامل نمو الخلايا البشرية لسرطان الرئة (EGFR).\n  4. فحص التعبير البروتيني لمستقبلات الموت المبرمج لسرطان الرئة والأورام الصلبة (PDL 1).\n- آلية التمويل والإجراءات:\n  * تتوفر هذه الفحوصات والتحاليل الجينية التخصصية بشكل **مجاني بالكامل** للمرضى المنتفعين عبر برامج دعم المرضى وكروت التحاليل المجانية التي توفرها شركات الأدوية العالمية المصنعة للعلاجات الموجهة والمناعية المرتبطة بها (مثل شركة Janssen و AstraZeneca و Merck) كخدمة عملاء بموجب تعاقدات الهيئة معها.\n  * يتم إجراء التحاليل بموجب تذكرة طبية (روشتة) يحررها الطبيب المعالج للحالة وتختم بختم المستشفى أو العيادة وتوجه لمعامل التحاليل المتعاقدة (مثل معامل ألفا Alfa Labs) لإجراء الفحص الجيني مجاناً.\n  * لا تترتب على إجراء هذه الفحوصات أي أعباء مالية أو نفقات إضافية على موارد الهيئة العامة للتأمين الصحي، وتتحملها الشركات المصنعة بالكامل للمرضى الذين يثبت طبياً استحقاقهم لتلقي العلاج المرتبط بالتحليل.",
    "keywords": ["17P Deletion", "BRCA", "EGFR", "PDL1", "genetic testing", "oncology", "alfa labs", "تحاليل جينية", "طفرات", "اورام", "سرطان الثدي", "سرطان الرئة"]
  },
  {
    "drug_name_ar": "بروتوكول علاج التصلب المتناثر (MS Drugs)",
    "drug_name_en": "Multiple Sclerosis Treatment Protocols and Drugs",
    "protocol_ar": "تحديث بروتوكول علاج التصلب العصبي المتناثر (Multiple Sclerosis - MS) المعتمد بالهيئة العامة للتأمين الصحي لتسهيل خطوط العلاج ومراقبة صرف البدائل الحيوية:\n\n1. المرحلة الأولى من العلاج (First-Line Therapy):\n- تم إدراج عقار Ponvory (Ponesimod) ضمن أدوية خط العلاج الأول.\n- يتم استخدام البدائل الأقل سعراً المتاحة على منظومة الشراء الموحد لجميع الحالات حديثة التشخيص من المرضى الكبار (أكبر من 18 عاماً) عند الصرف لأول مرة، مثل استخدام Fingolimod أو Teriflunomide بدلاً من المستحضرات الأصلية، مع الحفاظ على استمرار الصرف بالاسم التجاري للقرارات القديمة السارية للمرضى تلافياً لحدوث انتكاسات.\n- بالنسبة للأطفال (أقل من 18 عاماً) سواء في القرارات السارية القديمة أو الجديدة: يستمر صرف الاسم التجاري مباشرة (مثل Aubagio أو Gilenya).\n\n2. خط العلاج الأخير (Advanced/Last-Line Therapy):\n- تم إدراج عقار Mayzent (Siponimod) كخط علاجي أخير ويتم البدء في استخدامه فور توافره بمنظومة الشراء الموحد.\n\n3. صلاحيات وسلطة صرف أدوية البروتوكول:\n- يتم صرف كافة أدوية بروتوكول التصلب المتناثر مباشرة من خلال اللجان الفرعية للتصلب العصبي المتناثر بالفروع لتسهيل وصول الدواء للمرضى.\n- **استثناء هام:** عقاقير (Tysabri, Mavenclad, Ocrevus) لا يتم صرفها أو تكرارها إلا بعد الحصول على قرار طبي معتمد من اللجنة الطبية العليا للتصلب العصبي المتناثر بمقرها الحالي بمستشفى مدينة نصر للتأمين الصحي بالقاهرة، مع إعادة تقييم المريض دورياً كل 5 أشهر من اللجنة العليا.",
    "keywords": ["MS", "Multiple Sclerosis", "التصلب المتناثر", "ponvory", "mayzent", "Siponimod", "Fingolimod", "Teriflunomide", "aubagio", "gilenya", "Tysabri", "Mavenclad", "Ocrevus"]
  },
  {
    "drug_name_ar": "بروتوكولات أدوية الأورام والحالات الخاصة (Oncology Protocols)",
    "drug_name_en": "Oncology and Special Diseases Dispensary Guide",
    "protocol_ar": "تصنيف الأدوية والبروتوكولات الخاصة بالأورام وأمراض الدم التي لا تحتاج لموافقة اللجنة العليا للدواء، والأدوية المشروطة بموافقتها وصرفها داخل الهيئة:\n\nأولاً: أدوية مدرجة بالبروتوكولات الأساسية وتصرف عبر اللجان الفرعية دون العرض على اللجنة العليا للدواء:\n[TABLE_START]\nالتشخيص | الأدوية المعتمدة بالبروتوكول\nابيضاض الدم الحاد (Acute Leukemia) | Methylprednisolone, Asparaginase, Vincristine, Cyclophosphamide, Doxorubicin, Mercaptopurine, Cytarabine, Methotrexate\nالأورام الصلبة المختلفة (Solid Malignancies) | Cosmegen (Dactinomycin)\nحالات الحساسية الصدرية والشعبية (Allergy) | Seretide, Pulmicort ampules (0.25mg / 0.5mg), Monuril\nالتهاب الدماغ المناعي (Autoimmune encephalitis) | Methylprednisolone\nالتصلب العصبي والتهاب النخاع (MS-NMO-Anti MOG) | Methylprednisolone\nالتصلب المخي (Cerebric sclerosis) | Folic acid\nحالاتStatus Dystonicus | Solindin\nحالات النزف الوقائي (Prophylaxis) | Fibrinogen\nمضاد فطريات لمرضى أورام الدم من بنك الدم | Vfend (Voriconazole)\n[TABLE_END]\n\nثانياً: أدوية يقتصر صرفها من داخل الوحدات المملوكة للهيئة بعد موافقة اللجنة الطبية العليا للدواء:\n[TABLE_START]\nالعقار | ضوابط وصلاحيات صرف العلاج داخل الوحدات\nRevolade (Eltrombopag) | حالات الأنيميا اللاتنسجية (Aplastic Anemia)، نقص الصفائح الدموية المناعي المستعصي (ITP)، حالات عوز المناعة الأولي، والالتهابات الذاتية المستعصية\nConcept (Mycophenolate) | حالات التصلب العصبي والتهاب النخاع وحالات التصلب الدرني (Tuberous Sclerosis)\nAdalimumab / Etanercept | تصرف لعلاج الروماتيزم والمناعة داخل المستشفيات المملوكة للهيئة فقط\nMyfortic / Everolimus | حالات زراعة الأعضاء ومثبطات المناعة التخصصية وفقاً للجرعات المقررة\nOmalizumab / Dupilumab | لحالات الحساسية المناعية المستعصية والربو الشديد والتهاب الجلد التأتبي بعد موافقة اللجنة العليا\nFlixotide 125mcg | يصرف بموجب استشارة صدرية معتمدة من طبيب الهيئة بالوحدات التابعة\n[TABLE_END]\n\nثالثاً: أدوية يتم صرفها من الجهات المتعاقدة مع الهيئة بموافقة اللجنة العليا للدواء ومتابعة الشراء الموحد:\n[TABLE_START]\nالعقار | تعليمات وضوابط الصرف من الجهة المتعاقدة\nIVIG | في حالات ITP، وفي حال عدم توفره بالجهة يرفق إفادة رسمية وتصحب الأدوية من صيدلية الجهة وتعتمد من الشؤون الطبية\nMycophenolate mofetil | يصرف بموجب قرار اللجنة العليا المرفق مع ملف الصرف وبموافقة استشاري التخصص\nRituximab (Mabthera) | لعلاج الأورام وأمراض الدم بعد استيفاء فحوصات الفيروسات الكبدية وبموافقة اللجنة العليا\nNeutropenia Drugs | تستخدم في حالات نقص المناعة الحاد لمرضى الأورام شريطة ألا يقل عدد الصفائح الدموية عن 100 ألف وبموجب صورة دم كاملة حديثة\nAmbisome | لعلاج حالات نقص المناعة المصحوبة بحمى (Febrile Neutropenia) والعدوى الفطرية الشديدة لمرضى السرطان والخاضعين للكيماوي المكثف\n[TABLE_END]",
    "keywords": ["Oncology", "Leukemia", "ITP", "Revolade", "Concept", "Dupilumab", "Omalizumab", "Ambisome", "Neutropenia", "كيماوي", "سرطان", "اورام الدم"]
  },
  {
    "drug_name_ar": "ضوابط صرف أدوية خاصة (Colistin, Zavicefta, Tygacil, Neupogen)",
    "drug_name_en": "Special Dispensing Rules for Critical Antibiotics & Growth Factors",
    "protocol_ar": "ضوابط صرف بعض العقاقير ذات الطبيعة الحيوية أو التكلفة العالية بعد مراجعة إدارة الشؤون الطبية بالفرع للتأكد من ترشيد الاستهلاك الفعلي للمستشفيات:\n\n[TABLE_START]\nالعقار والمستحضر | ضوابط وإجراءات صرف العلاج للمريض\nColistin / Zavicefta | يقتصر صرفهما للحالات الحرجة المحجوزة بأقسام الرعاية المركزة بالمستشفى، ويشترط الصرف بموجب عينة طبية وتقرير مزرعة حديث يثبت حساسية الميكروب الفعالة لهما بعد مراجعة اللجنة الطبية المختصة.\nTygacil (Tigecycline) | يستخدم لعلاج العدوى المستعصية والحالات الحرجة بالرعايات عند عدم استجابة المريض للمضادات الحيوية الأخرى الأقل سعراً.\nNeupogen (Filgrastim) | يستدعي صرف العقار العرض المباشر على طبيب الأورام أو أمراض الدم أو زرع الأعضاء فقط، على ألا يتجاوز الصرف الحالات التي يظهر فيها تحليل صورة الدم الكاملة (CBC) نقصاً حاداً بالخلايا المتعادلة أو الصفائح الدموية عن 100 ألف.\n[TABLE_END]",
    "keywords": ["Colistin", "Zavicefta", "Tygacil", "Neupogen", "antibiotics", "رعاية مركزة", "مضادات حيوية", "مزرعة", "نيوبوجين"]
  },
  {
    "drug_name_ar": "حمض الثيوكتيك لالتهاب الأعصاب الطرفية (Thioctic acid - Thiotacid)",
    "drug_name_en": "Thioctic acid (Thiotacid) Prescribing Guidelines",
    "protocol_ar": "بناءً على تقارير وتوصيات اللجان الطبية والعلمية المتخصصة برئاسة الهيئة بخصوص تنظيم وصف وصرف عقار حمض الثيوكتيك (Thioctic acid / Thiotacid):\n\n- يصنف العقار كعلاج مكمل (Supplementary Treatment) يضاف لخطة العلاج الأساسية لمرضى التهاب الأعصاب الطرفية المتعدد لمرضى السكري، وليس كعلاج أساسي منفرد للمرض.\n- سلطة الوصف المعتمدة: استشاري التخصص بالعيادة والمستشفى.\n- الجرعة اليومية القصوى المحددة: 600 مجم يومياً (سواء كجرعة واحدة صباحاً أو مقسمة على جرعتين).\n- شروط المتابعة والصرف:\n  * يخضع المريض لإعادة تقييم إكلينيكي مستمر مرة كل 3 أشهر لمتابعة مدى استفادته الفعلية من العقار.\n  * يتم وقف الصرف فوراً وبشكل نهائي في حال عدم ثبوت الجدوى العلاجية المرجوة منه للمريض.\n  * يمنع تماماً صرف العقار بالتزامن مع فيتامين ب (فيتامين ب المركب) منعاً للازدواجية الدوائية وإهدار موارد الهيئة.\n  * الحالات الاستثنائية التي تتجاوز الجرعة المقررة: تعرض مستنداتها بتقرير استشاري مفصل للجنة الطبية العليا للدواء للبت في استحقاقها.",
    "keywords": ["Thioctic acid", "Thiotacid", "التهاب الاعصاب", "فيتامين ب", "ثيوكتيك أسيد", "ثيوتا سيد", "مرض السكري"]
  },
  {
    "drug_name_ar": "بندامستين وفوريكونازول بتقرير اللجنة الفرعية - فرع سوهاج",
    "drug_name_en": "Bendamustine & Voriconazole Subcommittee Delegation - Sohag",

    "protocol_ar": "تيسيراً على المرضى الحاصلين على خطوط علاجية مستمرة وتخفيفاً للضغط على اللجان الطبية العليا، تقرر العمل بالقواعد التالية لأدوية الروماتيزم والجلدية وأمراض الكلى المناعية:\n\n1. عقار أسيتريتين لعلاج الصدفية (Acitretin):\n- يتم الصرف مباشرة بقرار طبي صادر من استشاري أمراض الجلدية بالعيادة دون الحاجة للعرض على اللجنة الطبية العليا للدواء.\n\n2. أدوية علاج أمراض الكلى المناعية والمثبطة للمناعة:\nتضم الأدوية التالية:\n- Mycophenolate mofetil (تركيز 250 مجم و 500 مجم)\n- Cyclosporin (تركيزات 25، 50، 100 مجم أقراص وشراب)\n- Rapamune (Rapamycin / Sirolimus 1mg)\n- Mycophenolic acid (تركيز 180 مجم و 360 مجم)\n- Tacrolimus (تركيز 0.5 مجم و 1 مجم)\nضوابط الصرف:\n- يتم عرض المريض على اللجنة الطبية العليا للدواء في **المرة الأولى فقط** لتأكيد التشخيص واعتماد البروتوكول العلاجي بموجب تقرير استشاري التخصص المعالج.\n- تكرار صرف العقار للمريض شهرياً يتم مباشرة بموافقة مدير إدارة التموين الطبي بالفرع تيسيراً على المرضى ودون العرض مجدداً على اللجنة العليا.\n\n3. عقار فورتيو لهشاشة العظام الشديدة (Forteo / Teriparatide):\n- يتم الصرف بموجب قرار صادر من اللجنة الطبية العليا للدواء، ويجدد القرار دورياً كل 6 أشهر بناءً على تقرير استشاري معتمد يوضح الاستجابة الإكلينيكية وفحص كثافة العظام للمريض.",

    "protocol_ar": "بناءً على الاستفسارات الفنية الواردة من بعض صيدليات الهيئة بخصوص آلية صرف وتكرار عقار فينتوكلاكس (Venetoclax) لمرضى ابيضاض الدم:\n\n- نظراً لأن موافقة اللجنة الطبية العليا للمريض تصدر بمدة صلاحية 3 أشهر، بينما تتوفر العبوة التجارية الأصلية للعقار في شكل زجاجة (برطمان) مغلق يحتوي على (120 قرصاً) تكفي المريض لمدة 4 أشهر علاجية كاملة.\n- وحرصاً على سلامة المرضى وتطبيقاً لتعليمات مكافحة العدوى والجودة المشددة بالهيئة والتي **تمنع منعاً باتاً فتح العبوات الأصلية أو صرف العلاج بالقرص المجزأ**.\n- تقرر السماح لصيدليات المستشفيات المعتمدة بصرف العبوة المغلقة كاملة (زجاجة 120 قرصاً) للمريض لتغطية احتياجه العلاجي، على أن يتم التنسيق وتعديل صلاحية موافقة اللجنة الطبية العليا إلكترونياً بالتنسيق مع إدارة الشؤون الطبية بالفرع لتتطابق مع كمية العبوة المنصرفة وتجنب الهدر أو العجز بالمخزون.",

    "protocol_ar": "قائمة العقاقير الحيوية والبيولوجية المعتمدة لعلاج الأمراض الروماتيزمية والمناعية وأمراض الدم وسلطة اتخاذ قرار الصرف بالهيئة:\n\n[TABLE_START]\nم | اسم العقار العلمي | الشكل الصيدلاني | التشخيص المعتمد بالبروتوكول | سلطة وصلاحية اتخاذ قرار الصرف بالهيئة\n1 | Tocilizumab (Actemra) | حقن وريدي/تحت الجلد | التهاب الفقار الملحق والتهاب المفاصل الروماتويدي | اللجنة الطبية العليا للروماتيزم والمناعة\n2 | Adalimumab (Humira / Hyrimoz) | سرنجات معبأة | التهاب القولون التقرحي والتهاب المفاصل الروماتويدي | اللجنة الطبية العليا للروماتيزم والمناعة\n3 | Etanercept (Enbrel) | سرنجات معبأة | التهاب الفقار اللاصق والصدفية المفصلية النشطة | اللجنة الطبية العليا للروماتيزم والمناعة\n4 | Infliximab (Remicade) | حقن وريدي | داء كرون والتهاب القولون التقرحي والصدفية | اللجنة الطبية العليا للروماتيزم والمناعة\n5 | Certolizumab | سرنجات معبأة | داء كرون المستعصي والتهاب المفاصل الصدفي | اللجنة الطبية العليا للروماتيزم والمناعة\n6 | Tremfya / Cosentyx / Taltz | سرنجات معبأة | حالات الصدفية اللويحية المتوسطة إلى الشديدة | اللجنة الطبية العليا للروماتيزم والمناعة\n7 | Golimumab (Simponi) | سرنجات معبأة | التهاب المفاصل الروماتويدي والتهاب الفقار اللاصق | اللجنة الطبية العليا للروماتيزم والمناعة\n8 | Stelara (Ustekinumab) | حقن وريدي/تحت الجلد | داء كرون النشط والتهاب القولون التقرحي | اللجنة الطبية العليا للروماتيزم والمناعة\n9 | Secukinumab | سرنجات معبأة | التهاب الفقار الروماتيزمي المناعي والصدفية | اللجنة الطبية العليا للروماتيزم والمناعة\n10 | Xeljanz (Tofacitinib) | أقراص | التهاب المفاصل الروماتويدي النشط المستعصي | اللجنة الطبية العليا للروماتيزم والمناعة\n11 | Baricitinib (Olumiant) | أقراص | التهاب المفاصل الروماتويدي المتوسط إلى الشديد | قرار اللجنة الفرعية للروماتيزم والمناعة\n12 | Dupilumab (Dupixent) | سرنجات معبأة | حالات التهاب الجلد التأتبي والربو الشعبي الشديد | اللجنة الطبية العليا للجلدية والمناعة بالفرع\n13 | Omalizumab (Xolair) | سرنجات معبأة | الأرتيكاريا المزمنة المستعصية والربو التحسسي الشديد | اللجنة الطبية العليا للجلدية والمناعة بالفرع\n14 | Denosumab 60mg (Prolia) | سرنجات معبأة | حالات تكون العظم الناقص (Osteogenesis Imperfecta) | اللجنة الطبية العليا للروماتيزم والمناعة\n15 | Zoledronic acid 4mg / 5mg | حقن وريدي | حالات هشاشة العظام الشديدة والوقاية من الكسور | اللجنة الطبية العليا للروماتيزم والمناعة\n16 | Filgrastim (Neupogen) | سرنجات معبأة | حالات نقص الخلايا المتعادلة الحاد لمرضى الدم | وصف وصرف استشاري التخصص بالعيادة\n17 | Deferasirox | أقراص | حالات تراكم الحديد لمرضى أنيميا البحر المتوسط | وصف وصرف استشاري التخصص لمرضى الثلاسيميا\n18 | Revolade (Eltrombopag) | أقراص | حالات نقص الصفائح الدموية المناعي المستعصي (ITP) | اللجنة الطبية العليا لأمراض الدم بالفرع\n19 | Romiplostim (Nplate) | حقن تحت الجلد | حالات نقص الصفائح الدموية المناعي المستعصي (ITP) | اللجنة الطبية العليا لأمراض الدم بالفرع\n20 | Darbepoetin alfa / Epoetin | سرنجات معبأة | فقر الدم المصاحب للفشل الكلوي المزمن والأورام | وصف وصرف استشاري التخصص لمرضى الكلى\n21 | Factor VII / Factor VIII / Factor IX | حقن وريدي | علاج جيني ووقائي لمرضى الهيموفيليا (نزف الدم) | اللجنة الطبية العليا لمرضى الهيموفيليا (علاج وقائي)\n22 | Emicizumab (Hemlibra) | حقن تحت الجلد | الوقاية من النزيف لمرضى الهيموفيليا (أ) بوجود مثبطات | اللجنة الطبية العليا لمرضى الهيموفيليا (علاج وقائي)\n23 | Cyclosporine (أقراص وشراب) | أقراص/محلول | المتلازمة الكلوية وحالات زرع الأعضاء ونقص المناعة | أول قرار من اللجنة العليا لـ 6 شهور، والتجديد للفرعية\n24 | Mycophenolate mofetil / acid | أقراص | تثبيط المناعة لمرضى الكلى والذئبة الحمراء والزرع | أول قرار من اللجنة العليا لـ 6 شهور، والتجديد للفرعية\n25 | Tacrolimus / Sirolimus | كبسولات | تثبيط المناعة لمرضى زراعة الأعضاء والكلية | أول قرار من اللجنة العليا لـ 6 شهور، والتجديد للفرعية\n[TABLE_END]\n\nملاحظة هامة لحالات زراعة الأعضاء:\n- عند التجديد السنوي لمرضى زراعة الأعضاء (الزرع) باللجنة العليا، يلتزم المريض بعرض الجرعة الحالية الفعالة والالتزام بتقديم الميعاد القادم لإجراء تحاليل قياس تركيز الدواء بالدم لضمان استقرار الحالة والوصول للقراءة الطبيعية.",
    "keywords": ["Actemra", "Humira", "Enbrel", "Remicade", "Dupixent", "Xolair", "Revolade", "Hemlibra", "هيموفيليا", "روماتويد", "علاج بيولوجي"]
  }
];
        const drugListContainer = document.getElementById('drugListContainer');
        const drugListElement = document.getElementById('drugList');
        const searchInput = document.getElementById('searchInput');
        const didYouMeanElement = document.getElementById('didYouMean');
        const noResultsElement = document.getElementById('noResults');
        const tocListElement = document.getElementById('tocList');
        const sidebar = document.getElementById('sidebar');
        const sidebarToggle = document.getElementById('sidebarToggle');
        const mainContent = document.getElementById('mainContent');
        let activeTocLink = null;

        function levenshtein(a, b) {
            if (a.length === 0) return b.length;
            if (b.length === 0) return a.length;
            const matrix = Array(b.length + 1).fill(null).map(() => Array(a.length + 1).fill(null));
            for (let i = 0; i <= a.length; i += 1) { matrix[0][i] = i; }
            for (let j = 0; j <= b.length; j += 1) { matrix[j][0] = j; }
            for (let j = 1; j <= b.length; j += 1) {
                for (let i = 1; i <= a.length; i += 1) {
                    const indicator = a[i - 1] === b[j - 1] ? 0 : 1;
                    matrix[j][i] = Math.min(
                        matrix[j][i - 1] + 1,
                        matrix[j - 1][i] + 1,
                        matrix[j - 1][i - 1] + indicator,
                    );
                }
            }
            return matrix[b.length][a.length];
        }

        function renderTable(tableString) {
            const rows = tableString.trim().split('\n');
            if (rows.length === 0) return '';
            let html = '<table class="protocol-table">';
            const headerRow = rows[0].split('|').map(h => h.trim());
            html += '<thead><tr>';
            headerRow.forEach(header => html += `<th>${escapeHTML(header)}</th>`);
            html += '</tr></thead><tbody>';
            for (let i = 1; i < rows.length; i++) {
                html += '<tr>';
                const cells = rows[i].split('|').map(cell => cell.trim());
                cells.forEach(cell => html += `<td>${escapeHTML(cell)}</td>`);
                html += '</tr>';
            }
            html += '</tbody></table>';
            return html;
        }
        
        function cleanProtocolText(text) {
            let cleanedText = escapeHTML(text);
            cleanedText = cleanedText.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            cleanedText = cleanedText.replace(/\*(.*?)\*/g, (match, p1) => {
                if (p1.match(/^\s|\s$|\d/) || match.match(/\s\*\s/) || p1.trim() === "") {
                    return match;
                }
                return `<em>${p1}</em>`;
            });
            cleanedText = cleanedText.replace(/^-\s+/gm, '&bull; ');
            cleanedText = cleanedText.replace(/\n-\s+/gm, '\n&bull; ');
            cleanedText = cleanedText.replace(/^\*\s+/gm, '&bull; ');
            cleanedText = cleanedText.replace(/\n\*\s+/gm, '\n&bull; ');
            cleanedText = cleanedText.replace(/^(\d+)\.\s+/gm, (match, num) => `${num}.&nbsp;&nbsp;`);
            cleanedText = cleanedText.replace(/\n(\d+)\.\s+/gm, (match, num) => `\n${num}.&nbsp;&nbsp;`);

            return cleanedText.trim();
        }

        function createDrugEntryHTML(drug, searchTerm = '') {
            const entryId = `drug-${escapeHTML(drug.drug_name_en || drug.drug_name_ar).replace(/[^a-zA-Z0-9أ-ي]/g, '-').toLowerCase()}`;
            let rawProtocol = drug.protocol_ar;

            const tableRegex = /\[TABLE_START\]([\s\S]*?)\[TABLE_END\]/g;
            let processedProtocol = '';
            let lastIndex = 0;

            rawProtocol.replace(tableRegex, (match, tableData, offset) => {
                let nonTablePart = rawProtocol.substring(lastIndex, offset);
                nonTablePart = cleanProtocolText(nonTablePart);
                if (searchTerm) {
                    const highlightRegex = new RegExp(`(${searchTerm.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})(?![^<]*>)`, 'gi');
                    nonTablePart = nonTablePart.replace(highlightRegex, '<span class="highlight">$1</span>');
                }
                processedProtocol += nonTablePart.replace(/\n/g, '<br>');
                processedProtocol += renderTable(tableData);
                lastIndex = offset + match.length;
                return '';
            });

            let remainingPart = rawProtocol.substring(lastIndex);
            remainingPart = cleanProtocolText(remainingPart);
            if (searchTerm) {
                const highlightRegex = new RegExp(`(${searchTerm.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})(?![^<]*>)`, 'gi');
                remainingPart = remainingPart.replace(highlightRegex, '<span class="highlight">$1</span>');
            }
            processedProtocol += remainingPart.replace(/\n/g, '<br>');

            let finalHtmlContent = '';
            const segments = processedProtocol.split(/(<table.*?<\/table>)/s);
            segments.forEach(segment => {
                if (segment.startsWith('<table')) {
                    finalHtmlContent += segment;
                } else {
                    const paragraphs = segment.split(/(?:<br>\s*){2,}|<br>\n<br>/g);
                    paragraphs.forEach(para => {
                        if (para.trim()) {
                           let paragraphText = para.trim();
                           finalHtmlContent += `<p>${paragraphText}</p>`;
                        }
                    });
                }
            });
            if (finalHtmlContent.startsWith('<p></p>')) {
                finalHtmlContent = finalHtmlContent.substring(7);
            }

            return `
                <div class="drug-entry" id="${entryId}">
                    <h2>
                        ${escapeHTML(drug.drug_name_ar)}
                        ${drug.drug_name_en && drug.drug_name_en !== drug.drug_name_ar ? `<span class="drug-name-en">(${escapeHTML(drug.drug_name_en)})</span>` : ''}
                    </h2>
                    <h3>البروتوكول / التعليمات:</h3>
                    <div>${finalHtmlContent}</div>
                    ${drug.keywords && drug.keywords.length > 0 ? `<div class="keywords"><strong>كلمات مفتاحية:</strong> ${drug.keywords.map(escapeHTML).join('، ')}</div>` : ''}
                </div>
            `;
        }

        function displayDrugs(drugsToDisplay, isSearch = false) {
            drugListElement.innerHTML = '';
            if (drugsToDisplay.length === 0 && searchInput.value.trim()) {
                noResultsElement.style.display = 'block';
                return;
            }
            noResultsElement.style.display = 'none';

            drugsToDisplay.forEach(drug => {
                drugListElement.innerHTML += createDrugEntryHTML(drug, isSearch ? searchInput.value.trim().toLowerCase() : '');
            });
        }

        function populateToc(drugsForToc = drugData) {
            tocListElement.innerHTML = '';
            drugsForToc.forEach(drug => {
                const listItem = document.createElement('li');
                const link = document.createElement('a');
                const entryId = `drug-${(drug.drug_name_en || drug.drug_name_ar).replace(/[^a-zA-Z0-9أ-ي]/g, '-').toLowerCase()}`;
                link.href = `#${entryId}`;
                let tocText = drug.drug_name_en || drug.drug_name_ar;
                if (drug.drug_name_en && drug.drug_name_ar && drug.drug_name_en.toLowerCase() !== drug.drug_name_ar.toLowerCase()) {
                    tocText += ` (${drug.drug_name_ar})`;
                }
                link.textContent = tocText;
                link.title = tocText; 

                link.onclick = function(e) {
                    e.preventDefault();
                    const targetElement = document.getElementById(entryId);
                    if (targetElement) {
                        const headerOffset = document.querySelector('.header-controls').offsetHeight + 10; 
                        const elementPosition = targetElement.getBoundingClientRect().top + mainContent.scrollTop;
                        const offsetPosition = elementPosition - headerOffset;

                        mainContent.scrollTo({
                            top: offsetPosition,
                            behavior: 'smooth'
                        });
                    }
                    if (activeTocLink) {
                        activeTocLink.classList.remove('active');
                    }
                    link.classList.add('active');
                    activeTocLink = link;

                    if (window.innerWidth <= 768 && sidebar.classList.contains('open')) {
                        sidebar.classList.remove('open');
                        mainContent.classList.remove('sidebar-open');
                        sidebarToggle.textContent = '☰';
                    }
                };
                listItem.appendChild(link);
                tocListElement.appendChild(listItem);
            });
        }

        function filterDrugs() {
            const searchTerm = searchInput.value.trim().toLowerCase();
            didYouMeanElement.textContent = '';

            if (!searchTerm) {
                displayDrugs(drugData, false);
                populateToc(drugData);
                noResultsElement.style.display = 'none';
                if (activeTocLink) {
                    activeTocLink.classList.remove('active');
                    activeTocLink = null;
                }
                return;
            }

            const filteredDrugs = drugData.filter(drug =>
                drug.drug_name_ar.toLowerCase().includes(searchTerm) ||
                (drug.drug_name_en && drug.drug_name_en.toLowerCase().includes(searchTerm)) ||
                cleanProtocolText(drug.protocol_ar).toLowerCase().includes(searchTerm) ||
                (drug.keywords && drug.keywords.some(kw => kw.toLowerCase().includes(searchTerm)))
            );

            displayDrugs(filteredDrugs, true);
            populateToc(filteredDrugs);

            if (activeTocLink && !filteredDrugs.some(d => {
                let linkTextContent = activeTocLink.textContent;
                const arabicPartMatch = linkTextContent.match(/\((.*)\)/);
                if (arabicPartMatch) {
                    linkTextContent = linkTextContent.replace(arabicPartMatch[0], '').trim();
                }
                const drugIdentifier = d.drug_name_en || d.drug_name_ar;
                return drugIdentifier === linkTextContent;
            })) {
                activeTocLink.classList.remove('active');
                activeTocLink = null;
            }

            if (filteredDrugs.length === 0 && searchTerm.length > 1) {
                let suggestions = [];
                drugData.forEach(drug => {
                    const nameToTestAr = drug.drug_name_ar.toLowerCase();
                    const nameToTestEn = drug.drug_name_en ? drug.drug_name_en.toLowerCase() : '';
                    
                    const distAr = levenshtein(searchTerm, nameToTestAr);
                    const distEn = nameToTestEn ? levenshtein(searchTerm, nameToTestEn) : Infinity;
                    
                    let effectiveDist = Math.min(distAr, distEn);
                    let suggestedName = distAr <= distEn ? drug.drug_name_ar : drug.drug_name_en;

                    let keywordMatch = false;
                    if (drug.keywords) {
                        for (const kw of drug.keywords) {
                            if (kw.toLowerCase().includes(searchTerm)) {
                                keywordMatch = true;
                                break;
                            }
                        }
                    }
                    
                    const threshold = Math.max(1, Math.floor( (nameToTestEn || nameToTestAr).length / 3.5));

                    if (effectiveDist <= threshold && effectiveDist < (nameToTestEn || nameToTestAr).length) {
                        suggestions.push({ drug, dist: effectiveDist, name: suggestedName });
                    } else if (keywordMatch && !suggestions.find(s => s.drug === drug)) {
                        suggestions.push({ drug, dist: 100 + (drug.drug_name_en || drug.drug_name_ar).length, name: (drug.drug_name_en || drug.drug_name_ar) });
                    }
                });

                suggestions.sort((a, b) => a.dist - b.dist);

                if (suggestions.length > 0) {
                    didYouMeanElement.textContent = 'هل تقصد: ';
                    const topSuggestions = suggestions.slice(0, 3);
                    topSuggestions.forEach((s, index) => {
                        let suggestionText = s.drug.drug_name_en || s.drug.drug_name_ar;
                        if (s.drug.drug_name_en && s.drug.drug_name_ar && s.drug.drug_name_en.toLowerCase() !== s.drug.drug_name_ar.toLowerCase()) {
                             suggestionText += ` (${s.drug.drug_name_ar})`;
                        }
                        const a = document.createElement('a');
                        a.textContent = suggestionText;
                        a.onclick = () => setSearchAndFocus(s.drug.drug_name_en || s.drug.drug_name_ar);
                        didYouMeanElement.appendChild(a);
                        
                        if (index < topSuggestions.length - 1) {
                            didYouMeanElement.appendChild(document.createTextNode('، '));
                        }
                    });
                    didYouMeanElement.appendChild(document.createTextNode('؟'));
                } else {
                     noResultsElement.style.display = 'block';
                }
            } else {
                 noResultsElement.style.display = filteredDrugs.length === 0 ? 'block' : 'none';
            }
        }

        function setSearchAndFocus(term) {
            searchInput.value = term;
            filterDrugs();
            
            const firstMatchingDrug = drugData.find(drug => 
                (drug.drug_name_en && drug.drug_name_en.toLowerCase() === term.toLowerCase()) || 
                drug.drug_name_ar.toLowerCase() === term.toLowerCase()
            );

            if (firstMatchingDrug) {
                const entryId = `drug-${(firstMatchingDrug.drug_name_en || firstMatchingDrug.drug_name_ar).replace(/[^a-zA-Z0-9أ-ي]/g, '-').toLowerCase()}`;
                const targetElement = document.getElementById(entryId);
                if (targetElement) {
                    const headerOffset = document.querySelector('.header-controls').offsetHeight + 10;
                    const elementPosition = targetElement.getBoundingClientRect().top + mainContent.scrollTop;
                    const offsetPosition = elementPosition - headerOffset;
                    mainContent.scrollTo({ top: offsetPosition, behavior: 'smooth' });

                    const tocLinks = tocListElement.querySelectorAll('a');
                    tocLinks.forEach(link => {
                        let linkTextForMatch = link.textContent.split(' (')[0];
                        let drugIdentifierForMatch = firstMatchingDrug.drug_name_en || firstMatchingDrug.drug_name_ar;
                        if(linkTextForMatch === drugIdentifierForMatch) {
                            if (activeTocLink) activeTocLink.classList.remove('active');
                            link.classList.add('active');
                            activeTocLink = link;
                        }
                    });
                }
            }
             if (window.innerWidth <= 768 && sidebar.classList.contains('open')) {
                sidebar.classList.remove('open');
                mainContent.classList.remove('sidebar-open');
                sidebarToggle.textContent = '☰';
            }
        }

        sidebarToggle.addEventListener('click', () => {
            sidebar.classList.toggle('open');
            mainContent.classList.toggle('sidebar-open');
            sidebarToggle.textContent = sidebar.classList.contains('open') ? '✕' : '☰';
        });

        document.addEventListener('click', function(event) {
            if (window.innerWidth <= 768 && sidebar.classList.contains('open')) {
                const isClickInsideSidebar = sidebar.contains(event.target);
                const isClickOnToggle = sidebarToggle.contains(event.target);
                if (!isClickInsideSidebar && !isClickOnToggle) {
                    sidebar.classList.remove('open');
                    mainContent.classList.remove('sidebar-open');
                    sidebarToggle.textContent = '☰';
                }
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            displayDrugs(drugData, false);
            populateToc();
        });
    </script>
